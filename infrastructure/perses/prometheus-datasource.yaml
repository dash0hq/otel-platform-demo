apiVersion: perses.dev/v1alpha2
kind: PersesDatasource
metadata:
  name: prometheus
  namespace: default
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/instance: perses-sample
  config:
    default: true
    plugin:
      kind: PrometheusDatasource
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: "http://prometheus.default.svc.cluster.local:9090"
